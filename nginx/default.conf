server {

  listen 443 ssl;
  listen [::]:443 ssl;

  server_name magm.mooo.com;

  ssl_certificate /etc/letsencrypt/live/cernikiw3.chickenkiller.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/cernikiw3.chickenkiller.com/privkey.pem;
  
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }  

  location /api/ {
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;  
  }

  location /adminer/ {
    proxy_pass http://adminer:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;  
  }

}

server {
  listen 443 ssl;
  server_name auth.cernikiw3.chickenkiller.com;

  ssl_certificate /etc/letsencrypt/live/cernikiw3.chickenkiller.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/cernikiw3.chickenkiller.com/privkey.pem;

  location / {
    proxy_pass http://keycloak:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
